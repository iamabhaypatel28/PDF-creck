services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app/uploads:/app/app/uploads
    env_file:
      - ./app/.env
    # Removed local db dependency since you are using Neon DB live
    # If you want local DB, we can add it back, but currently you provided Neon URL.

    # No volumes needed if using Neon
