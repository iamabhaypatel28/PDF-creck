services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist uploads between restarts
      - ./app/uploads:/app/app/uploads
      # Persist john.pot (cracked passwords) across container restarts
      - ./john-bleeding-jumbo/run:/app/john-bleeding-jumbo/run
    env_file:
      - ./app/.env
